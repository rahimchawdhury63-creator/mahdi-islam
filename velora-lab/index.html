        /* CSS Reset & Variables */
        :root {
            --bg-color: #0d1117;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        /* Container Animation */
        .wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            animation: fadeIn 1.2s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Typography */
        h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: clamp(1.2rem, 3vw, 1.75rem);
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* Links */
        .info-btn {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--bg-color);
            background-color: var(--accent);
            border-radius: 50px;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(88, 166, 255, 0.39);
        }

        .info-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* Footer & Powered By */
        footer {
            margin-top: 3rem;
            padding-bottom: 1rem;
            animation: fadeIn 1.5s ease-out forwards;
            opacity: 0;
        }

        .powered-by-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: block;
        }

        /* SEO High-Value Backlink Styling */
        .seo-backlink {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .seo-backlink:hover {
            transform: scale(1.05);
        }

        .brand-logo {
            max-width: 180px;
            height: auto;
            display: block;
        }

        /* Keyframes */
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
